tunnel: 41c382f6-0955-444d-ab1e-e5aca1a49569

ingress:
  - hostname: senses-api.ifops.com.br
    service: http://senses-os-api:3000
    originRequest:
      noTLSVerify: true
      connectTimeout: 30s

  # Sentinel dashboard (dev) — Next dev server roda no host (não em container).
  # Gateway da rede senses_default (172.24.0.1) é o host visto de dentro do
  # container cloudflared. Funciona enquanto next dev estiver bound em *:3000.
  - hostname: sentinel-dev.ifops.com.br
    service: http://172.24.0.1:3000
    originRequest:
      noTLSVerify: true
      connectTimeout: 30s

  # Supabase self-hosted (field-dashboard) — Kong gateway expõe Studio (raiz,
  # basic auth) + API REST. cloudflared conectado à rede supabase_default
  # resolve supabase-kong por DNS interno do Docker.
  - hostname: supabase.ifops.com.br
    service: http://supabase-kong:8000
    originRequest:
      noTLSVerify: true
      connectTimeout: 30s

  - service: http_status:404
